<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
    font-family:Segoe UI,Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#0099ff;
    color:white;
    padding:20px;
}

.container{
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:red;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <h2>Dora Fanclub Việt Nam</h2>
</div>

<div class="container">

    <div class="card">
        <h3>Xin chào Admin 👋</h3>
        <p>Đăng nhập thành công.</p>
    </div>

    <div class="card">
        <h3>Quản lý hệ thống</h3>
        <p>Thêm các chức năng của bạn tại đây.</p>
    </div>

    <button onclick="logout()">Đăng xuất</button>

</div>

<script>

if(sessionStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

function logout(){
    sessionStorage.removeItem("loggedIn");
    window.location.href = "index.html";
}

</script>

</body>
</html>
