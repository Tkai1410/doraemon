<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập - Hệ thống quản lý Dora Fanclub Việt Nam</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0099ff,#00c3ff);
}

.login-box{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#0099ff;
    font-size:28px;
}

.logo p{
    color:#666;
    margin-top:5px;
}

.input-group{
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
}

.input-group input:focus{
    outline:none;
    border-color:#0099ff;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#0099ff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0078d7;
}

.error{
    margin-top:12px;
    color:red;
    text-align:center;
    display:none;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#888;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-box">

    <div class="logo">
        <h1>DORA FANCLUB</h1>
        <p>Hệ thống quản lý nội bộ</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>Tên đăng nhập</label>
            <input type="text" id="username" required>
        </div>

        <div class="input-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">Đăng nhập</button>

        <div class="error" id="error">
            Sai tài khoản hoặc mật khẩu!
        </div>

    </form>

    <div class="footer">
        © 2026 Dora Fanclub Việt Nam
    </div>

</div>

<script>

const USERNAME = "admin";
const PASSWORD = "dora2026";

document.getElementById("loginForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const user =
        document.getElementById("username").value;

    const pass =
        document.getElementById("password").value;

    if(user === USERNAME && pass === PASSWORD){

        sessionStorage.setItem("loggedIn","true");

        window.location.href = "dashboard.html";

    }else{

        document.getElementById("error")
        .style.display = "block";

    }

});
</script>

</body>
</html>
